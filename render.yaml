services:
  - type: web
    name: predictx-arena
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: CRIC_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: RESET_DB
        value: "false"
      - key: DATA_DIR
        value: /data
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1

